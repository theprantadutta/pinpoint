name: pinpoint
description: "A new Flutter project."

publish_to: 'none'

version: 2.3.2+26

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_displaymode: ^0.7.0
  flutter_dotenv: ^6.0.0
  google_fonts: ^8.0.2
  shared_preferences: ^2.3.5
  go_router: ^17.0.0
  animate_do: ^5.1.0
  material_symbols_icons: ^4.2801.1
  stylish_bottom_bar: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0
  drift: ^2.24.0
  drift_flutter: ^0.3.0
  get_it: ^9.0.5
  skeletonizer: ^2.0.1
  choice: ^2.3.2
  record: ^7.0.0
  audioplayers: ^6.1.2
  path_provider: ^2.1.5
  avatar_glow: ^3.0.1
  flutter_localizations:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  intl: 0.20.2
  toastification: ^3.0.0
  drift_db_viewer: ^2.1.0
  image_picker: ^1.1.2
  permission_handler: ^12.0.0+1
  delightful_toast: ^1.1.0
  flutter_animate: ^4.5.2
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  local_auth: ^3.0.0
  encrypt: ^5.0.1
  speech_to_text: ^7.1.0
  logger: ^2.4.0
  share_plus: ^13.1.0
  printing: ^5.11.1
  file_picker: ^12.0.0-beta.5
  painter: ^2.0.0
  pdf: ^3.10.8
  flutter_secure_storage: ^10.0.0-beta.1
  flutter_timezone: ^5.0.1
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.5.1
  # iOS StoreKit backend for in_app_purchase (App Store billing on iOS)
  in_app_purchase_storekit: ^0.4.3
  # Sign in with Apple (required by App Store Guideline 4.8 alongside Google Sign-In)
  sign_in_with_apple: ^8.1.0
  # SHA-256 nonce hashing for Sign in with Apple (was transitive; now used directly)
  crypto: ^3.0.6
  in_app_update: ^4.2.3
  in_app_review: ^2.0.12
  dio: ^5.7.0
  package_info_plus: ^10.1.0
  device_info_plus: ^13.1.0
  connectivity_plus: ^7.0.0
  provider: ^6.1.2
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  google_sign_in: ^7.1.1
  firebase_analytics: ^12.1.2
  firebase_messaging: ^16.0.4
  firebase_crashlytics: ^5.0.8
  async_queue: ^3.0.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  fleather: ^1.15.0
  parchment: ^1.15.0
  parchment_delta: ^1.0.0
  tutorial_coach_mark: ^1.3.3
  # At-rest DB encryption (Phase 1 / F2): sqlite3 3.x selects the encrypted
  # "SQLite Multiple Ciphers" build via the `hooks:` block below. sqlite3 + path
  # are used directly by lib/database/secure_database.dart.
  sqlite3: ^3.3.2
  path: ^1.9.1
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.24.0
  build_runner: ^2.4.14

# Phase 1 / F2: build the encrypted "SQLite Multiple Ciphers" native library
# (supports PRAGMA key/rekey) instead of plain sqlite3, for at-rest DB encryption.
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter_plugins:
  logger:
    platforms:
      android:
      ios:
      linux:
      macos:
      web:
      windows:

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/legal/
    # Bundled Google Fonts (all weights + italics) so google_fonts loads them
    # from assets instead of fetching over the network at runtime. Discovered
    # automatically by google_fonts via the asset manifest; do NOT also list
    # them under `fonts:`. See lib/main.dart (allowRuntimeFetching = false).
    - assets/fonts/google_fonts/
